syntax = "proto3";

package condor_common;

service MessageService {
    rpc CreateJobGroup (CreateJobGroupRequest) returns (CreateJobGroupResponse);
    rpc GetJobGroup (GetJobGroupRequest) returns (GetJobGroupResponse);
    rpc GetGroupTemplate (GetGroupTemplateRequest) returns (GetGroupTemplateResponse);
    rpc UpdateJobGroup (UpdateJobGroupRequest) returns (UpdateJobGroupResponse);
    rpc ListJobGroups (ListJobGroupsRequest) returns (ListJobGroupsResponse);
    rpc DeleteJobGroup (DeleteJobGroupRequest) returns (DeleteJobGroupResponse);
    rpc CreateJob (CreateJobRequest) returns (CreateJobResponse);
    rpc GetJob (GetJobRequest) returns (GetJobResponse);
    rpc ListJobs (ListJobsRequest) returns (ListJobsResponse);
    rpc DeleteJob (DeleteJobRequest) returns (DeleteJobResponse);
    rpc UpdateJobStatus (UpdateJobStatusRequest) returns (UpdateJobStatusResponse);
    rpc PopJobFromGroup (PopJobFromGroupRequest) returns (PopJobFromGroupResponse);
}

message CreateJobGroupRequest {
    string name = 1;
    string template = 2;
}

message CreateJobGroupResponse {
    string id = 1;
}

message GetJobGroupRequest {
    string id = 1;
}

message GetJobGroupResponse {
    string id = 1;
    string name = 2;
    string template = 3;
    int32 current_version = 4;
}

message UpdateJobGroupRequest {
    string id = 1;
    string template = 2;
}

message UpdateJobGroupResponse {
    int32 new_version = 1;
}

message GetGroupTemplateRequest {
    string group_id = 1;
    int32 version = 2;
}

message GetGroupTemplateResponse {
    string template = 1;
}

message ListJobGroupsRequest {}

message ListJobGroupsResponse {
    repeated JobGroupSummary job_groups = 1;
}

message JobGroupSummary {
    string id = 1;
    string name = 2;
    int32 current_version = 3;
}

message DeleteJobGroupRequest {
    string id = 1;
}

message DeleteJobGroupResponse {}

message CreateJobRequest {
    string group_id = 1;
    string name = 2;
    map<string, string> parameters = 3;
}

message CreateJobResponse {
    string id = 1;
}

message GetJobRequest {
    string id = 1;
}

message GetJobResponse {
    string id = 1;
    string group_id = 2;
    string name = 3;
    map<string, string> parameters = 4;
    JobStatus status = 5;
    int32 template_version = 6;
}

message ListJobsRequest {
    string group_id = 1;
}

message ListJobsResponse {
    repeated JobSummary jobs = 1;
}

message JobSummary {
    string id = 1;
    string name = 2;
    JobStatus status = 3;
    int32 template_version = 4;
}

message DeleteJobRequest {
    string id = 1;
}

message DeleteJobResponse {}

enum JobStatus {
    JOB_STATUS_CREATED = 0;
    JOB_STATUS_RUNNING = 1;
    JOB_STATUS_FAILED = 2;
    JOB_STATUS_COMPLETED = 3;
}

message UpdateJobStatusRequest {
    string id = 1;
    JobStatus status = 2;
    string group_id = 3;
}

message UpdateJobStatusResponse {
    bool success = 1;
}

message PopJobFromGroupRequest {
    string group_id = 1;
}

message PopJobFromGroupResponse {
    string job_id = 1;
}